name: ${COMPOSE_PROJECT_NAME:-taxikiwi}

x-service-defaults: &service-defaults
  restart: unless-stopped
  networks:
    - taxikiwi_local
  logging:
    driver: json-file
    options:
      max-size: ${DOCKER_LOG_MAX_SIZE:-10m}
      max-file: ${DOCKER_LOG_MAX_FILE:-3}

services:
  postgres:
    <<: *service-defaults
    image: postgis/postgis:16-3.5
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-taxikiwi}
      POSTGRES_USER: ${POSTGRES_USER:-taxikiwi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-taxikiwi_dev_password}
      POSTGRES_INITDB_ARGS: '--encoding=UTF8 --locale=C.UTF-8'
      PGDATA: /var/lib/postgresql/data/pgdata
      TZ: ${TZ:-UTC}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-taxikiwi} -d ${POSTGRES_DB:-taxikiwi} -h 127.0.0.1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    <<: *service-defaults
    image: redis:7-alpine
    command:
      - redis-server
      - --appendonly
      - 'yes'
      - --save
      - '60'
      - '1'
      - --loglevel
      - warning
    environment:
      TZ: ${TZ:-UTC}
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  mailpit:
    <<: *service-defaults
    image: axllent/mailpit:v1.29
    environment:
      MP_DATABASE: /data/mailpit.db
      MP_MAX_MESSAGES: ${MAILPIT_MAX_MESSAGES:-5000}
      TZ: ${TZ:-UTC}
    ports:
      - '${MAILPIT_WEB_PORT:-8025}:8025'
      - '${MAILPIT_SMTP_PORT:-1025}:1025'
    volumes:
      - mailpit_data:/data

  adminer:
    <<: *service-defaults
    image: adminer:5.4.2
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ADMINER_DEFAULT_SERVER: ${ADMINER_DEFAULT_SERVER:-postgres}
      ADMINER_DESIGN: ${ADMINER_DESIGN:-pepa-linha}
      TZ: ${TZ:-UTC}
    ports:
      - '${ADMINER_PORT:-8080}:8080'

networks:
  taxikiwi_local:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  mailpit_data:
